fps_max "256";
fps_max_ui "256";
sensitivity "1.45";

bind "space" "+jump"
bind "mwheeldown" "+jump";
bind "mwheelup" "";
bind "v" "+voicerecord";
bind "mouse5" "voice_modenable_toggle";
bind "mouse4" "";

bind "o" "incrementvar cl_radar_scale 0 1 0.25"

bind "F1" "buy vesthelm;buy vest;buy vest;"
bind "F2" "buy defuser;"
bind "F3" "buy ak47;buy m4a1;"
bind "F4" "buy deagle;"
bind "F5" "buy smokegrenade;"
bind "F6" "buy hegrenade;"
bind "F7" "buy flashbang;"
bind "F8" "buy molotov;buy incgrenade;"

viewmodel_fov "60";
viewmodel_offset_x "-2";
viewmodel_offset_y "2";
viewmodel_offset_z "-2";
viewmodel_presetpos "0";

con_enable "1"

// ==========================================================
// CROSSHAIR 1 - (CSGO-84hmD-cqbpQ-U8FV6-npKpZ-iGAfD)
// ==========================================================
alias "c1_p1" "cl_crosshairgap -5; cl_crosshair_outlinethickness 1; cl_crosshaircolor_r 255; cl_crosshaircolor_g 255; cl_crosshaircolor_b 255"
alias "c1_p2" "cl_crosshairalpha 188; cl_crosshair_dynamic_splitdist 5; cl_crosshair_recoil false; cl_fixedcrosshairgap -10; cl_crosshaircolor 5"
alias "c1_p3" "cl_crosshair_drawoutline 1; cl_crosshairthickness 0.5; cl_crosshairdot 1; cl_crosshairstyle 4; cl_crosshairsize 0; cl_crosshair_t 0"
alias "set_cross1" "c1_p1; c1_p2; c1_p3;"

// ==========================================================
// CROSSHAIR 2 - (CSGO-2iMYF-Np4Wh-no8pW-d8woQ-8fOUD)
// ==========================================================
alias "c2_p1" "cl_crosshairgap -1; cl_crosshair_outlinethickness 1; cl_crosshaircolor_r 255; cl_crosshaircolor_g 255; cl_crosshaircolor_b 255"
alias "c2_p2" "cl_crosshairalpha 255; cl_crosshair_dynamic_splitdist 7; cl_crosshair_recoil false; cl_fixedcrosshairgap 0; cl_crosshaircolor 5"
alias "c2_p3" "cl_crosshair_drawoutline 0; cl_crosshairthickness 0.1; cl_crosshairdot 0; cl_crosshairstyle 4; cl_crosshairsize 2.2; cl_crosshair_t 0"
alias "set_cross2" "c2_p1; c2_p2; c2_p3;"

// ==========================================================
// CROSSHAIR 3 - (CSGO-pZHK2-ncxWT-T55U3-4CLhw-JrWPA)
// ==========================================================
alias "c3_p1" "cl_crosshairgap -5; cl_crosshair_outlinethickness 0; cl_crosshaircolor_r 0; cl_crosshaircolor_g 0; cl_crosshaircolor_b 0"
alias "c3_p2" "cl_crosshairalpha 255; cl_crosshair_recoil false; cl_fixedcrosshairgap 3; cl_crosshaircolor 5; cl_crosshair_drawoutline 1"
alias "c3_p3" "cl_crosshairthickness 1.6; cl_crosshairdot 0; cl_crosshairstyle 4; cl_crosshairsize 0.7; cl_crosshair_t 0"
alias "set_cross3" "c3_p1; c3_p2; c3_p3;"

// ==========================================================
// CROSSHAIR 4 - (CSGO-TBWtN-obbqG-YkztQ-rQxSO-5xzpH)
// ==========================================================
alias "c4_p1" "cl_crosshairgap 0.7; cl_crosshair_outlinethickness 1; cl_crosshaircolor_r 0; cl_crosshaircolor_g 0; cl_crosshaircolor_b 0"
alias "c4_p2" "cl_crosshairalpha 255; cl_crosshair_recoil false; cl_fixedcrosshairgap 0; cl_crosshaircolor 5; cl_crosshair_drawoutline 0"
alias "c4_p3" "cl_crosshairthickness 0.6; cl_crosshairdot 1; cl_crosshairstyle 4; cl_crosshairsize 5; cl_crosshair_t 0"
alias "set_cross4" "c4_p1; c4_p2; c4_p3;"

// ==========================================================
// KEY BINDINDG FOR CYCLE
// ==========================================================
alias "ch_cycle" "ch_step1"

alias "ch_step1" "set_cross1; alias ch_cycle ch_step2"
alias "ch_step2" "set_cross2; alias ch_cycle ch_step3"
alias "ch_step3" "set_cross3; alias ch_cycle ch_step4"
alias "ch_step4" "set_cross4; alias ch_cycle ch_step1"

bind "ALT" "ch_cycle"
